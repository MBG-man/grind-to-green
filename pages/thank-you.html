<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | GrindToGreen</title>
  <meta name="description" content="Thank you for contacting GrindToGreen.">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:#e5e7eb;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      background:#1e293b;
      max-width:600px;
      width:100%;
      padding:40px;
      border-radius:14px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.3);
    }

    .checkmark{
      font-size:60px;
      margin-bottom:15px;
    }

    h1{
      color:#22c55e;
      margin-bottom:15px;
    }

    p{
      color:#cbd5e1;
      line-height:1.6;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      background:#22c55e;
      color:#fff;
      text-decoration:none;
      padding:12px 24px;
      border-radius:8px;
      font-weight:bold;
      transition:.2s;
    }

    .btn:hover{
      background:#16a34a;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="checkmark">✅</div>

    <h1>Thank You!</h1>

    <p>
      Your message has been received. We appreciate you contacting
      GrindToGreen and will get back to you as soon as possible.
    </p>

    <a href="/" class="btn">Return Home</a>
  </div>

</body>
