<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | GrindToGreen</title>
  <meta name="description" content="Contact GrindToGreen for guest posts, collaborations, and inquiries." />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: #e5e7eb;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: #020617;
}

.logo {
  color: #22c55e;
  font-weight: bold;
}

.navbar a {
  color: #e5e7eb;
  text-decoration: none;
  margin-left: 20px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  color: #22c55e;
  font-size: 2.2rem;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* FORM */
.contact-form {
  display: flex;
  flex-direction: column;
}

.contact-form label {
  margin-top: 10px;
}

.contact-form input,
.contact-form textarea {
  padding: 10px;
  margin-top: 5px;
  border-radius: 6px;
  border: none;
  outline: none;
}

.contact-form textarea {
  min-height: 120px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.btn:hover {
  background: #16a34a;
}

/* EMAIL BOX */
.email-box {
  text-align: center;
  margin-top: 20px;
}

.email {
  color: #22c55e;
  font-weight: bold;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  background: #020617;
  margin-top: 40px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">GrindToGreen</div>
  <div>
    <a href="../index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>--
</div>

<!-- HERO -->
<div class="hero">
  <h1>Contact Us</h1>
  <p>We’d love to hear from you</p>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <h2>Send a Message</h2>

    <form class="contact-form" onsubmit="sendMail(event)">
      <label>Name</label>
      <input type="text" id="name" required placeholder="Your Name">

      <label>Email</label>
      <input type="email" id="email" required placeholder="Your Email">

      <label>Message</label>
      <textarea id="message" required placeholder="Your Message"></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>

    <div class="email-box">
      <p>Or email us directly:</p>
      <p class="email">grindtogreendev@gmail.com</p>
    </div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  Guest posts and collaborations welcome | GrindToGreen
</div>

<script>
function sendMail(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  let mailtoLink = `mailto:grindtogreendev@gmail.com?subject=Contact from ${name}&body=${message} (Email: ${email})`;

  window.location.href = mailtoLink;
}
</script>

</body>
</html>
