<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | Grind To Green</title>
  <meta name="description" content="Contact GrindToGreen for guest posts, collaborations, and inquiries." />

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Grind To Green">
  <meta property="og:title"       content="Contact Us | Grind To Green">
  <meta property="og:description" content="Contact GrindToGreen for guest posts, collaborations, and inquiries.">
  <meta property="og:url"         content="https://grindtogreen.com/pages/contact">
  <meta property="og:image"       content="https://grindtogreen.com/images/og-default.jpg">

  <link rel="canonical" href="https://grindtogreen.com/pages/contact">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="apple-touch-icon"                    href="/images/apple-touch-icon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  </noscript>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header id="main-header">
  <div id="main-header-container">
    <a href="/" aria-label="Grind To Green Home">
      <svg xmlns="http://www.w3.org/2000/svg" width="180" height="44" viewBox="0 0 300 80" aria-hidden="true">
        <g transform="translate(10,15)">
          <rect x="0"  y="30" width="10" height="20" fill="#fff" rx="2"/>
          <rect x="15" y="20" width="10" height="30" fill="#fff" rx="2"/>
          <rect x="30" y="10" width="10" height="40" fill="#fff" rx="2"/>
          <rect x="45" y="0"  width="10" height="50" fill="#fff" rx="2"/>
        </g>
        <text x="75" y="50" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#fff">
          Grind<tspan fill="#86efac">ToGreen</tspan>
        </text>
      </svg>
    </a>
    <nav id="main-nav" aria-label="Main navigation">
      <a href="/">Home</a>
      <a href="/pages/about">About</a>
      <a href="/pages/contact">Contact</a>
      <a href="/pages/privacy">Privacy</a>
      <a href="/pages/terms">Terms</a>
    </nav>
    <button id="main-menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
  </div>
</header>  
<section class="contact-section">
<form
  name="contact"
  method="POST"
  data-netlify="true"
  netlify-honeypot="bot-field"
  class="contact-form"
>

  <input type="hidden" name="form-name" value="contact">

  <!-- Anti-spam -->
  <p hidden>
    <label>Don't fill this out:
      <input name="bot-field">
    </label>
  </p>

  <h1 style="text-align:left; font-size:1.8rem; color:var(--primary-dark); margin-bottom:6px;">
    Contact Us
  </h1>

  <p style="margin-bottom:24px; font-size:0.95rem;">
    We'd love to hear from you guest posts, collaborations, or just a hello.
  </p>

  <label>Name</label>
  <input type="text" name="name" required placeholder="Your name">

  <label>Email</label>
  <input type="email" name="email" required placeholder="your@email.com">

  <label>Subject</label>
  <input type="text" name="subject" placeholder="Guest post, collaboration, question…">

  <label>Message</label>
  <textarea name="message" required rows="5" placeholder="Your message…"></textarea>

  <button type="submit">Send Message</button>

</form>
</section>
<footer class="footer">
  <p>© <span id="footer-year"></span> Grind To Green. All rights reserved.</p>
</footer>

<script src="/js/app.js" defer></script>
<script>
  document.getElementById("footer-year").textContent = new Date().getFullYear();

  function sendMail() {
    const name    = document.getElementById("contact-name").value.trim();
    const email   = document.getElementById("contact-email").value.trim();
    const subject = document.getElementById("contact-subject").value.trim();
    const message = document.getElementById("contact-message").value.trim();

    if (!name || !email || !message) {
      alert("Please fill in your name, email, and message.");
      return;
    }

    const subjectLine = subject
      ? encodeURIComponent(subject + " — from " + name)
      : encodeURIComponent("Contact from " + name);

    const body = encodeURIComponent(
      "Name: " + name + "\nEmail: " + email + "\n\n" + message
    );

    window.location.href =
      "mailto:contact@grindtogreen.com?subject=" + subjectLine + "&body=" + body;

    // Show success banner
    document.getElementById("form-success").style.display = "block";
    document.getElementById("contact-name").value    = "";
    document.getElementById("contact-email").value   = "";
    document.getElementById("contact-subject").value = "";
    document.getElementById("contact-message").value = "";
  }
</script>
<script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>

</body>
</html>
